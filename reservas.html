    <link rel="icon" href="img/restaurante.png">
    <title>Reservas</title>
</head>
<body>

    <!-- INICIO DEL HEADER O MENU PRINCIPAL -->
    <header class="header">
        <div class="logo">
            <div class="imagenLogo">
                <img src="img/restaurante.png" alt="Logo del Restaurante">
            </div>
            <h1>
                Barriga<span>Feliz</span>
            </h1>
        </div>
        <nav class="menu">
            <ul>
                <li>
                    <a href="inicio.html">Inicio</a>
                </li>
                <li>
                    <a href="carta.html">Carta</a>
                </li>
                <li>
                    <a href="reservas.html">Reservas</a>
                </li>
            </ul>
        </nav>
    </header>
    <!-- FIN DEL HEADER O MENU PRINCIPAL -->

    <!-- INICIO MAIN O CONTENIDO -->
    <main class="main">
        <form action="">
            <div class="grupoCampo">
                <label for="" class="nombre">Nombres</label>
                <input type="text">
            </div>

            <div class="grupoCampo">
                <label for="" class="apellido">Apellidos</label>
                <input type="text">
            </div>

            <div class="grupoCampo">
                <label for="">Fecha</label>
                <input type="date" class="dateFecha">
            </div>

            <div class="grupoCampo">
                <label for="">¿Cuantas personas?</label>
                <input type="number" min="1" max="12">
            </div>

            <div class="grupoCampo">
                <label for="">¿Celebra algun momento?</label>
                <select name="" id="">
                    <option value="">Ninguno</option>
                    <option value="">Cumpleaños</option>
                    <option value="">Aniversario</option>
                </select>
            </div>

            <div class="grupoCampo anchoCompleto">
                <label for="" class="comentario">Comentarios</label>
                <textarea name="" id=""></textarea>
            </div>

            <button type="submit" class="boton anchoCompleto">Enviar</button>
        </form>
    </main>

    <!-- FIN MAIN O CONTENIDO -->

        <!-- INICIO DEL FOOTER -->
     <footer class="footer">
        <section class="nosotros">

        <section class="redes">

            <ul>
                <li>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                </li>
                <li>

                </li>
                <li>
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>

        </section>

        <section class="ubicacion">
